name: Nightly Regression

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

concurrency:
  group: nightly-regression-${{ github.workflow }}
  cancel-in-progress: false

jobs:
  regression:
    uses: ./.github/workflows/run-standalone-suite.yml
    with:
      suite_name: Nightly Regression
      test_target: tests
      pytest_args: -q -rs -p no:cacheprovider
      artifact_name: nightly-regression-artifacts
      timeout_minutes: 40
