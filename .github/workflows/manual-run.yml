name: Manual Run

on:
  workflow_dispatch:
    inputs:
      test_target:
        description: "Pytest path, file, or directory target"
        required: false
        default: tests
        type: string
      marker_expression:
        description: "Optional pytest marker expression, for example: api or \"e2e and not slow\""
        required: false
        default: ""
        type: string
      pytest_args:
        description: "Additional pytest arguments"
        required: false
        default: -q -rs -p no:cacheprovider
        type: string

concurrency:
  group: manual-run-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  run:
    uses: ./.github/workflows/run-standalone-suite.yml
    with:
      suite_name: Manual Run
      test_target: ${{ inputs.test_target }}
      marker_expression: ${{ inputs.marker_expression }}
      pytest_args: ${{ inputs.pytest_args }}
      artifact_name: manual-run-artifacts
      timeout_minutes: 40
